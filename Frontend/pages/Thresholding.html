<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Thresholding – EigenVision Suite</title>
  <meta name="description" content="Image thresholding using Optimal, Otsu, and Spectral methods.">

  <link href="../assets/img/favicon.png" rel="icon">
  <link href="../assets/img/apple-touch-icon.png" rel="apple-touch-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../assets/css/main.css" rel="stylesheet">
  <link href="../assets/css/Thresholding.css" rel="stylesheet">
</head>
<body class="index-page">

  <header id="header" class="header d-flex align-items-center fixed-top">
    <div class="container-fluid container-xl position-relative d-flex align-items-center">
      <a href="/" class="logo d-flex align-items-center">
        <img src="../assets/img/Logo-Cv-04.png" alt="">
      </a>
      <nav id="navmenu" class="navmenu mx-auto">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/faceRecognition" >Face Recognition</a></li>
          <li><a href="/segmentation">Segmentation</a></li>
            <li><a href="/thresholding" class="active">Thresholding</a></li>
        </ul>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>
      <a class="btn-getstarted flex-md-shrink-0" href="/faceRecognition">Try Demo</a>
    </div>
  </header>

  <main class="main seg-page">

 

    <!-- ── Main workspace ──────────────────────────────── -->
    <div class="container seg-workspace">
      <div class="row g-3">

        <!-- LEFT: Controls (upload + params) -->
        <div class="col-lg-4">
          <div class="seg-card">
            <div class="seg-card-header">
              <i class="bi bi-sliders2"></i>
              <span>Controls</span>
            </div>
            <div class="seg-card-body">

              <!-- Dropzone -->
              <div id="seg-dropzone-wrap">
                <div id="seg-dropzone" class="seg-dropzone">
                  <div class="seg-dropzone-icon"><i class="bi bi-cloud-upload"></i></div>
                  <p class="seg-dropzone-text">Drop image or <span class="seg-link">browse</span></p>
                  <p class="seg-dropzone-hint"><i class="bi bi-info-circle"></i> JPG · PNG · BMP · WEBP</p>
                </div>
                <input id="seg-file-input" type="file" accept="image/*" hidden>
              </div>

              <!-- Parameter panels (shown after upload) -->
              <div id="seg-preview-wrap" class="d-none">

                <!-- Optimal -->
                <div id="tab-optimal" class="seg-tab-panel active">
                  <!-- Global / Local radio -->
                  <div class="seg-radio-group">
                    <label class="seg-radio-label">
                      <input type="radio" name="optimal-scope" value="global" checked>
                      <span class="seg-radio-custom"></span> Global
                    </label>
                    <label class="seg-radio-label">
                      <input type="radio" name="optimal-scope" value="local">
                      <span class="seg-radio-custom"></span> Local
                    </label>
                  </div>
                  <!-- Window Size (Local only) -->
                  <div class="seg-param seg-local-only" id="optimal-window-wrap" style="display:none;">
                    <label>Window Size <span class="seg-val" id="optimal-window-val">15</span></label>
                    <input type="range" class="seg-slider" id="optimal-window" min="3" max="63" value="15" step="2">
                  </div>
                </div>

                <!-- Otsu -->
                <div id="tab-otsu" class="seg-tab-panel">
                  <!-- Global / Local radio -->
                  <div class="seg-radio-group">
                    <label class="seg-radio-label">
                      <input type="radio" name="otsu-scope" value="global" checked>
                      <span class="seg-radio-custom"></span> Global
                    </label>
                    <label class="seg-radio-label">
                      <input type="radio" name="otsu-scope" value="local">
                      <span class="seg-radio-custom"></span> Local
                    </label>
                  </div>
                  <!-- Window Size (Local only) -->
                  <div class="seg-param seg-local-only" id="otsu-window-wrap" style="display:none;">
                    <label>Window Size <span class="seg-val" id="otsu-window-val">15</span></label>
                    <input type="range" class="seg-slider" id="otsu-window" min="3" max="63" value="15" step="2">
                  </div>
                </div>

                <!-- Spectral -->
                <div id="tab-spectral" class="seg-tab-panel">
                  <div class="seg-param">
                    <label>Classes (Modes) <span class="seg-val" id="spectral-classes-val">3</span></label>
                    <input type="range" class="seg-slider" id="spectral-classes" min="2" max="8" value="3">
                  </div>
                  <div class="seg-param">
                    <label>Histogram Gaussian (σ) <span class="seg-val" id="spectral-sigma-val">1.0</span></label>
                    <input type="range" class="seg-slider" id="spectral-sigma" min="0.1" max="5.0" value="1.0" step="0.1">
                  </div>
                  <!-- Global / Local radio -->
                  <div class="seg-radio-group">
                    <label class="seg-radio-label">
                      <input type="radio" name="spectral-scope" value="global" checked>
                      <span class="seg-radio-custom"></span> Global
                    </label>
                    <label class="seg-radio-label">
                      <input type="radio" name="spectral-scope" value="local">
                      <span class="seg-radio-custom"></span> Local
                    </label>
                  </div>
                  <!-- Window Size (Local only) -->
                  <div class="seg-param seg-local-only" id="spectral-window-wrap" style="display:none;">
                    <label>Window Size <span class="seg-val" id="spectral-window-val">15</span></label>
                    <input type="range" class="seg-slider" id="spectral-window" min="3" max="63" value="15" step="2">
                  </div>
                </div>

                <!-- Action row -->
                <div class="seg-actions">
                  <button id="seg-run-btn" class="seg-btn seg-btn-primary"><i class="bi bi-play-fill"></i> Run</button>
                  <button id="seg-clear-btn" class="seg-btn seg-btn-ghost"><i class="bi bi-x-circle"></i> Clear</button>
                </div>

                <!-- Error -->
                <div id="seg-error" class="seg-alert seg-alert-danger d-none">
                  <i class="bi bi-exclamation-triangle-fill"></i>
                  <span id="seg-error-msg"></span>
                </div>

                <!-- Info pills -->
                <div id="seg-info-row" class="seg-info-row"></div>
              </div>

            </div>
          </div>

          <!-- Method tabs below controls card -->
          <div class="seg-method-tabs" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1rem;">
            <button class="seg-tab-btn active" data-method="optimal" style="flex:1;min-width:100px;"><i class="bi bi-bullseye"></i> Optimal</button>
            <button class="seg-tab-btn" data-method="otsu" style="flex:1;min-width:100px;"><i class="bi bi-bar-chart-steps"></i> Otsu</button>
            <button class="seg-tab-btn" data-method="spectral" style="flex:1;min-width:100px;"><i class="bi bi-activity"></i> Spectral</button>
          </div>
        </div>

        <!-- RIGHT: Image panels (Original + Result) -->
        <div class="col-lg-8">
          <div class="seg-card">
            <div class="seg-card-header">
              <i class="bi bi-images"></i>
              <span>Output</span>
              <!-- Loading indicator inline -->
              <div id="seg-loading" class="seg-inline-loading d-none ms-auto">
                <div class="seg-spin"><i class="bi bi-arrow-repeat"></i></div> Processing…
              </div>
            </div>
            <div class="seg-card-body seg-output-body">

              <!-- Empty state (before any upload) -->
              <div id="seg-empty-state" class="seg-empty-state">
                <i class="bi bi-image-alt"></i>
                <p>Upload an image and click <strong>Run</strong></p>
              </div>

              <!-- Image comparison grid -->
              <div class="seg-image-grid">

                <!-- Original -->
                <div class="seg-image-panel">
                  <div class="seg-panel-label"><i class="bi bi-image"></i> Original</div>
                  <div class="seg-panel-img-wrap">
                    <img id="seg-original-img" class="seg-panel-img" alt="Original" style="display:none;">
                  </div>
                </div>

                <!-- Result -->
                <div class="seg-image-panel">
                  <div class="seg-panel-label"><i class="bi bi-magic"></i> Thresholded</div>
                  <div class="seg-panel-img-wrap">
                    <img id="seg-result-img" class="seg-panel-img" alt="Result" style="display:none;">
                    <div id="seg-result-placeholder" class="seg-result-placeholder" style="display:none;">
                      <div class="spinner-border text-primary spinner-border-sm"></div>
                    </div>
                  </div>
                </div>

              </div><!-- /seg-image-grid -->

            </div>
          </div>
        </div>

      </div><!-- /row -->
    </div><!-- /container -->

  </main>

  <script src="../assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/thresholding.js"></script>
</body>
</html>
